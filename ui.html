<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSDTF</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
  width: 100%;
  max-width: 340px;
  padding: 32px 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

/* Logo */
.logo {
  width: 72px;
  height: 72px;
  border-radius: 20px;
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 24px rgba(220,38,38,0.35), 0 2px 6px rgba(0,0,0,0.2);
  position: relative;
}
.logo svg {
  width: 36px;
  height: 36px;
}
.logo::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, transparent 60%);
}

/* Title */
.title {
  text-align: center;
}
.title h1 {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.title p {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
  font-weight: 400;
  letter-spacing: 0.3px;
}

/* Status bar */
.status {
  width: 100%;
  padding: 10px 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  min-height: 40px;
}
.status .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status .dot.ready { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.4); }
.status .dot.busy { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.4); animation: pulse 1s infinite; }
.status .dot.done { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.4); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.status-text { flex: 1; }

/* Buttons */
.btn-group { width: 100%; display: flex; flex-direction: column; gap: 10px; }

.btn {
  width: 100%;
  padding: 12px 20px;
  border: none;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
  position: relative;
  overflow: hidden;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; pointer-events: none; }

.btn-folder {
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.85);
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-folder:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.18); }
.btn-folder svg { opacity: 0.6; }

.btn-load {
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  color: #fff;
  box-shadow: 0 4px 16px rgba(220,38,38,0.3);
}
.btn-load:hover { box-shadow: 0 6px 24px rgba(220,38,38,0.45); transform: translateY(-1px); }

.btn-load.loading { opacity: 0.7; }
.btn-load.loading svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* File list */
.file-list {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 120px;
  overflow-y: auto;
}
.file-list::-webkit-scrollbar { width: 3px; }
.file-list::-webkit-scrollbar-track { background: transparent; }
.file-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

.file-item {
  padding: 6px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: rgba(255,255,255,0.6);
}
.file-item .icon { font-size: 12px; opacity: 0.5; }
.file-item .name { flex: 1; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.hidden { display: none !important; }
</style>
</head>
<body>
<div class="glass">
  <!-- Logo -->
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </div>

  <!-- Title -->
  <div class="title">
    <h1>DSDTF</h1>
    <p>Design System Delivery Tool For Figma</p>
  </div>

  <!-- Status -->
  <div class="status" id="status">
    <span class="dot" id="dot"></span>
    <span class="status-text" id="statusText">Ожидание файлов</span>
  </div>

  <!-- File List -->
  <div class="file-list hidden" id="fileList"></div>

  <!-- Buttons -->
  <div class="btn-group">
    <button class="btn btn-folder" id="btnFolder">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
      </svg>
      Выбрать папку с ДС
    </button>
    <button class="btn btn-load" id="btnLoad" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Загрузить в Figma
    </button>
  </div>
</div>

<script>
let selectedFiles = {};

document.getElementById('btnFolder').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.webkitdirectory = true;
  input.accept = '.json,.svg';
  input.onchange = (e) => {
    const files = e.target.files;
    if (!files.length) return;
    selectedFiles = {};
    const list = document.getElementById('fileList');
    list.innerHTML = '';
    for (const file of files) {
      if (!file.name.endsWith('.json') && !file.name.endsWith('.svg')) continue;
      selectedFiles[file.name] = file;
      const div = document.createElement('div');
      div.className = 'file-item fade-in';
      div.innerHTML = '<span class="icon">' + (file.name.endsWith('.json') ? '{ }' : '<>') + '</span><span class="name">' + file.name + '</span>';
      list.appendChild(div);
    }
    list.classList.remove('hidden');
    const count = Object.keys(selectedFiles).length;
    document.getElementById('statusText').textContent = 'Найдено файлов: ' + count;
    document.getElementById('dot').className = 'dot ready';
    document.getElementById('btnLoad').disabled = false;
  };
  input.click();
});

document.getElementById('btnLoad').addEventListener('click', () => {
  const btn = document.getElementById('btnLoad');
  btn.classList.add('loading');
  btn.disabled = true;
  document.getElementById('statusText').textContent = 'Загрузка в Figma...';
  document.getElementById('dot').className = 'dot busy';

  const readers = Object.entries(selectedFiles).map(([name, file]) =>
    new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve({ name, content: e.target.result });
      reader.readAsText(file);
    })
  );

  Promise.all(readers).then((results) => {
    parent.postMessage({ pluginMessage: { type: 'import', files: results } }, '*');
  });
});

window.addEventListener('message', (e) => {
  const msg = e.data.pluginMessage || e.data;
  if (!msg) return;
  if (msg.type === 'progress') {
    document.getElementById('statusText').textContent = msg.text;
  }
  if (msg.type === 'done') {
    document.getElementById('statusText').textContent = 'Готово! Создано стилей: ' + msg.count;
    document.getElementById('dot').className = 'dot done';
    const btn = document.getElementById('btnLoad');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
  if (msg.type === 'error') {
    document.getElementById('statusText').textContent = 'Ошибка: ' + msg.text;
    document.getElementById('dot').className = 'dot';
    const btn = document.getElementById('btnLoad');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
